<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Han bit-na Portfolio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: #000;
      color: #fff;
      font-family: Arial, "Noto Sans KR", sans-serif;
      overflow-x: auto;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: 1920px;
      min-height: 100vh;
      margin: 0 auto;
      background: #000;
    }

    .hero {
      background: #000;
      padding: 70px 140px 40px;
    }

    .hero-title-wrap {
      display: flex;
      align-items: flex-end;
      gap: 34px;
      white-space: nowrap;
    }

    .hero-title {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 174px;
      line-height: 0.92;
      font-weight: 700;
      letter-spacing: -0.06em;
      color: #fff;
    }

    .hero-name {
      font-size: 78px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.05em;
      margin-bottom: 18px;
    }

    .content-box {
      background: #efefef;
      color: #000;
      padding: 56px 36px 120px;
    }

    .intro-text {
      font-size: 72px;
      line-height: 1.2;
      font-weight: 300;
      letter-spacing: -0.05em;
      margin-bottom: 62px;
    }

    .section {
      margin-bottom: 190px;
    }

    .section:last-child {
      margin-bottom: 0;
    }

    .section-title {
      font-size: 116px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.07em;
      margin-bottom: 18px;
    }

    .section-subtitle {
      font-size: 56px;
      line-height: 1.2;
      font-weight: 300;
      letter-spacing: -0.05em;
      margin-bottom: 88px;
    }

    .pill-row {
      display: flex;
      justify-content: center;
      gap: 52px;
      flex-wrap: nowrap;
    }

    .pill {
      width: 506px;
      height: 122px;
      border-radius: 999px;
      background: #000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 34px;
      line-height: 1.2;
      font-weight: 800;
      letter-spacing: -0.04em;
      padding: 0 28px;
    }

    .footer-visual {
      background: #000;
      color: #fff;
      position: relative;
      padding: 10px 60px 56px;
      min-height: 510px;
    }

    .slogan {
      position: relative;
      width: 980px;
      height: 360px;
      margin-left: 0;
    }

    .slogan span {
      position: absolute;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 700;
      letter-spacing: -0.07em;
      line-height: 0.9;
      color: #fff;
      white-space: nowrap;
    }

    .slogan .line1 {
      left: 0;
      top: 0;
      font-size: 92px;
    }

    .slogan .line2 {
      left: 500px;
      top: 78px;
      font-size: 118px;
    }

    .slogan .line3 {
      left: 628px;
      top: 188px;
      font-size: 120px;
    }

    .contact-area {
      position: absolute;
      right: 130px;
      top: 226px;
      width: 430px;
    }

    .contact-block {
      margin-bottom: 66px;
    }

    .contact-block:last-child {
      margin-bottom: 0;
    }

    .contact-title {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 20px;
    }

    .insta-icon {
      width: 54px;
      height: 54px;
      border: 5px solid #fff;
      border-radius: 16px;
      position: relative;
    }

    .insta-icon::before {
      content: "";
      position: absolute;
      width: 22px;
      height: 22px;
      border: 4px solid #fff;
      border-radius: 50%;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    .insta-icon::after {
      content: "";
      position: absolute;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #fff;
      right: 9px;
      top: 9px;
    }

    .email-link {
      font-size: 26px;
      line-height: 1.4;
      font-weight: 400;
      word-break: break-all;
    }

    .copyright {
      text-align: center;
      font-size: 28px;
      line-height: 1.3;
      font-weight: 400;
      margin-top: 60px;
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="hero">
      <div class="hero-title-wrap">
        <h1 class="hero-title">Portfolio</h1>
        <div class="hero-name">Han bit-na</div>
      </div>
    </header>

    <main class="content-box">
      <p class="intro-text">포트폴리오 웹사이트 공간 입니다 .</p>

      <section class="section">
        <h2 class="section-title">타이틀01</h2>
        <p class="section-subtitle">부타이틀01</p>
        <div class="pill-row">
          <div class="pill">(준비중)</div>
          <div class="pill">(준비중)</div>
          <div class="pill">(준비중)</div>
        </div>
      </section>

      <section class="section">
        <h2 class="section-title">타이틀02</h2>
        <p class="section-subtitle">부타이틀02</p>
        <div class="pill-row">
          <div class="pill">캐릭터 사이트 (준비중)</div>
          <div class="pill">책 소개<br />사이트 (준비중)</div>
          <div class="pill">웹사이트 UI 제작<br />사이트 (준비중)</div>
        </div>
      </section>
    </main>

    <footer class="footer-visual">
      <div class="slogan">
        <span class="line1">Becoming</span>
        <span class="line2">a</span>
        <span class="line3">positive<br />designer</span>
      </div>

      <div class="contact-area">
        <div class="contact-block">
          <div class="contact-title">Social media</div>
          <div class="insta-icon" aria-label="Instagram icon"></div>
        </div>

        <div class="contact-block">
          <div class="contact-title">E-mail</div>
          <a class="email-link" href="mailto:comehere1009@gmail.com">comehere1009@gmail.com</a>
        </div>
      </div>

      <div class="copyright">@2026 hanbitna</div>
    </footer>
  </div>
</body>
</html>
